<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — BioLearn9</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  .hero {
    padding: 3.5rem 2rem 2rem;
    text-align: center;
    max-width: 980px;
    margin: 0 auto;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.3rem);
    font-weight: 800;
    line-height: 1.05;
    background: linear-gradient(135deg, var(--gd) 0%, var(--green) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.8rem;
  }
  .hero-sub { font-size: 1.05rem; color: var(--muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

  .content { max-width: 860px; margin: 0 auto; padding: 0 2rem 4rem; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.6rem;
    box-shadow: var(--shadow);
  }

  .label {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .form-grid { display: grid; gap: 1rem; }

  .field label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-family: 'Syne', sans-serif;
  }
  .field input,
  .field textarea {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 0.85rem;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    transition: border-color .2s;
  }
  .field textarea { min-height: 140px; resize: vertical; }
  .field input:focus,
  .field textarea:focus { outline: none; border-color: var(--green); }

  .form-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; }
  .form-note { font-size: 0.82rem; color: var(--muted); }

  .contact-line { font-size: 1.05rem; font-weight: 600; }
  .contact-line a { color: var(--green); }
  .contact-line a:hover { color: var(--gd); }

  @media (max-width: 600px) {
    .hero { padding: 2.5rem 1.2rem 1.6rem; }
    .content { padding: 0 1.2rem 3rem; }
  }
</style>
</head>
<body>
  <header>
    <div class="top-bar">
      <a class="logo" href="https://sabisudh-droid.github.io/training/">BIOLEARN<span>9</span></a>
      <div class="nav-links">
        <a class="nav-link" href="https://sabisudh-droid.github.io/training/">Catalog</a>
        <a class="nav-link" href="https://sabisudh-droid.github.io/training/about.html">About</a>
        <a class="nav-link" href="https://sabisudh-droid.github.io/training/contact.html">Contact</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <h1>Contact</h1>
    <p class="hero-sub">For collaboration, curriculum support, or questions about the training plans, reach out directly.</p>
  </section>

  <main class="content">
    <div class="card">
      <div class="label">Send a Message</div>
      <form id="contactForm" class="form-grid">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="question">Question</label>
          <textarea id="question" name="question" placeholder="How can I help?" required></textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Open Email Draft</button>
          <span class="form-note">This opens your default mail client with a prefilled message.</span>
        </div>
      </form>
    </div>
  </main>

  <footer>
    BioLearn9 · Contact
  </footer>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const question = document.getElementById('question').value.trim();
      const subject = encodeURIComponent('BioLearn9 Inquiry from ' + name);
      const body = encodeURIComponent(
        'Name: ' + name + '\\n' +
        'Email: ' + email + '\\n\\n' +
        'Question:\\n' + question + '\\n'
      );
      window.location.href = 'mailto:sabisudh@gmail.com?subject=' + subject + '&body=' + body;
    });
  </script>
</body>
</html>
